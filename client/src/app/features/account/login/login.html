<mat-card class="flex justify-around items-center max-w-lg mx-auto mt-32 p-8 bg-white">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="text-center mb-6">
            <h3 class="text-3xl font-semibold text-textBlueColor">Login</h3>
        </div>
        <mat-form-field appearance="outline" class="w-full mb-4 ">
            <mat-label>Email Address</mat-label>
            <input matInput type="email" formControlName="email" placeholder="email@example.com" />
        </mat-form-field>
        
        <mat-form-field appearance="outline" class="w-full mb-4 ">
            <mat-label>Password</mat-label>
            <input matInput type="password" formControlName="password" placeholder="Password" />            
        </mat-form-field>
        <button [disabled]="loginForm.invalid" mat-flat-button type="submit" class="w-full py-2 text-textBlueColor">Sign in</button>
    </form>
</mat-card>
