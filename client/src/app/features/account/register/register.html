
<mat-card class="flex justify-around items-center max-w-lg mx-auto mt-25 p-8 bg-white">
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div class="text-center mb-6">
            <h3 class="text-3xl font-semibold text-textBlueColor">Register</h3>
        </div>
        
    <app-text-input label="FirstName" formControlName="firstName" />
    <app-text-input label="LastName" formControlName="lastName" />
    <app-text-input label="email" type="email" formControlName="email" />
    <app-text-input label="password" type="password" formControlName="password" />

        @if (validationErrors().length > 0 ) {
            <div class="mb-3 p-4 bg-red-100">
                <ul class="list-disc px-2">
                    @for (item of validationErrors(); track $index) {
                        <li class="text-red-5"> {{item}} </li>
                    }
                </ul>
            </div>
        }

        <button mat-flat-button type="submit" class="w-full py-4 mt-2">Register</button>
    </form>

    <div>
        {{registerForm.value | json}}
        {{registerForm.errors | json}}
    </div>
</mat-card>
