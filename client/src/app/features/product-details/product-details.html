@if(product()){
<section class="py-8">
    <div class="max-w-screen-2xl px-4 mx-auto">
        <div class="grid grid-cols-2 gap-8">
            <div class="max-w-xl mx-auto">
                <img src="{{product()?.pictureUrl}}" alt="{{product()?.name}} image" class="w-full h-full">
            </div>
            <div >
                <h1 class="text-2xl font-semibold text-gray-900">{{product()?.name}}</h1>
                <div class="mt-4 items-center gap-4 flex">
                    <p class="text-3xl font-extrabold text-gray-900"> {{product()?.price| currency }}</p>
                </div>
                
                <div class="felx gap-4 mt-6 items-center">
                    <button mat-flat-button class="match-input-height min-h-14 mx-2">
                        <mat-icon>shopping_cart</mat-icon> Add to cart
                    </button>
                    
                    <mat-form-field appearance="outline" class="flex max-w-40 mx-2">
                        <mat-label>Quantity</mat-label>
                        <input matInput type="number">
                    </mat-form-field>
                </div>
                
                <mat-divider></mat-divider>
                
                <p class="mb-6 text-gray-900 mt-5">{{product()?.description}}</p>
            </div>
        </div>
    </div>
</section>

}
