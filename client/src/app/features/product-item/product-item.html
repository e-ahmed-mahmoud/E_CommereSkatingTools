<div>
    <mat-card appearance="raised">
        <img src="{{product().pictureUrl}}" class="rounded-t-md" alt="image of {{product().name}}" srcset="">
        <mat-card-content class="mt-3">
            <h3 class="text-xs font-semibold uppercase"> {{product().name}} </h3>
            <p class="font-light"> {{product().price | currency}} </p>
        </mat-card-content>
        <mat-card-actions>
            <button mat-stroked-button class="w-full">
                <mat-icon>add_shopping_cart</mat-icon>
                Add to cart
            </button>
        </mat-card-actions>
    </mat-card>
</div>
