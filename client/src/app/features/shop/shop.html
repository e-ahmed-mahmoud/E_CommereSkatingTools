<div class="flex flex-col gap-3">
    <div class="flex flex-row gap-3 justify-items-center justify-between items-center">
        <form #searchForm="ngForm" (ngSubmit)="onSearchChange()"
            class="relative flex items-center w-full max-w-md mx-6 justify-items-center justify-center ">
            <input type="text" name="search" placeholder="Search"
                class="block w-full p-3 text-sm text-gray-900 border border-gray-300 rounded-lg"
                [(ngModel)]="shopQueryParams().search">

            <button type="submit" class="absolute inset-y-0 right-8 top-2 flex items-center pl-5">
                <mat-icon class="mat-mdc-icon-button">search</mat-icon>
            </button>
        </form>
        <div class="flex justify-items-end items-center justify-end gap-3 flex-3">
            <button class="gap-3 p-3" mat-stroked-button (click)="showFiltersDialog()">
                <mat-icon>filter_list</mat-icon> Filter
            </button>
            <button class="gap-3" mat-stroked-button [mat-menu-trigger-for]="sortMenu">
                <mat-icon>swap_vert</mat-icon> Sort
            </button>

        </div>
    </div>
    <div class="grid md:grid-cols-5 sm:grid-cols-3 gap-4">
        @for(product of products()?.items; track product.id){
        <app-product-item [product]="product"></app-product-item>
        }
    </div>
    <div class="felx flex-row align-middle justify-items-center">
        <mat-paginator (page)="getNextPage($event)" [length]="products()?.count" [pageSizeOptions]="pageSizeOptions()"
            [pageSize]="shopQueryParams().pageSize" [pageIndex]="shopQueryParams().pageNumber -1"
            [showFirstLastButtons]="true" aria-label="Select Page">
        </mat-paginator>
    </div>
</div>

<mat-menu #sortMenu>
    <mat-selection-list multiple="false" (selectionChange)="onSortChange($event)">
        @for(sort of sortOption(); track $index){
        <mat-list-option [value]="sort.value" [selected]="sort.name === sort.value">{{sort.name}}</mat-list-option>
        }
    </mat-selection-list>
</mat-menu>
