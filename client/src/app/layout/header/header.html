<header class="shadow-md p-3 w-full max-h-20 fixed bg-white top-0 z-50 mb-20">
    <div class="flex align-middle items-center justify-between max-w-screen-2xl mx-auto">
        <a routerLink="/">
            <img src="/images/shopLogo.png" alt="app logo" class="max-h-17 scale-185 object-contain hover:pointer-coarse">
        </a>
        <nav class="flex gap-3 my-2 uppercase text-xl">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
            <a routerLink="/shop" routerLinkActive="active">Shop</a>
            <a routerLink="/contactUs" routerLinkActive="active" >Contact</a>
        </nav>
        <div class="flex gap-3 align-middle">
            <a routerLink="/cart" matBadge="{{cartService.cartItemsCount()}}" matBadgeSize="large" class=" mt-2 mr-2">
                <mat-icon>shopping_cart</mat-icon>
            </a>
            <button mat-stroked-button>Login</button>
            <button mat-stroked-button>Register</button>
        </div>
    </div>
</header>

@if(loadingService.isLoading()){
    <mat-progress-bar mode="indeterminate" class="fixed top-20"></mat-progress-bar>
}
