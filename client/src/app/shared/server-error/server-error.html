
<div class="container mt-5 p4 bg-gray-100 rounded shadow-lg">
    <h1 class="text-2xl font-semibold mb4"> Inter server error </h1>

    @if(error()){
        <h5 class="text-red-600">Error: {{error()?.message}}</h5>

        <h5 class="text-lg font-semibold mb-2"> Stack trace</h5>
        @if(isDevelopemntEnv()){
            <mat-card class="p-4 bg-white"> 
                <code class="block whitespace-pre-wrap"> {{error()?.error.details}} </code>    
            </mat-card>
        }
    }
</div>
